  <style>
    /* ─── RESET ─── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    /* ─── TOKENS ─── */
    :root{
      --bg:#080b10;
      --sf:#0f1318;
      --sf2:#161b24;
      --bd:rgba(99,179,237,.1);
      --bdh:rgba(99,179,237,.28);
      --tx:#e8edf6;
      --mu:#7a8aa8;
      --ac:#3db8f5;
      --ac2:#1a8fcc;
      --glow:rgba(61,184,245,.3);
      --gr:#22d17a;
      --r:14px;
      --rs:10px;
      --f:'Be Vietnam Pro',system-ui,sans-serif;
      --t:.22s;
    }
    @media(prefers-reduced-motion:reduce){
      *{animation-duration:.01ms!important;transition-duration:.01ms!important;animation-iteration-count:1!important}
    }

    /* ─── BASE ─── */
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{
      font-family:var(--f);
      background:var(--bg);
      color:var(--tx);
      min-height:100svh;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeSpeed;
    }

    /* Ambient glow — composite-only layer */
    body::before{
      content:'';
      position:fixed;inset:0;
      background:
        radial-gradient(ellipse 60% 40% at 50% -10%, rgba(61,184,245,.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 110%, rgba(34,209,122,.03) 0%, transparent 60%);
      pointer-events:none;z-index:0;
    }

    /* ─── LAYOUT ─── */
    .wrap{
      position:relative;z-index:1;
      width:min(480px,100%);
      margin-inline:auto;
      padding:clamp(24px,5vw,56px) clamp(14px,4vw,24px) clamp(48px,8vw,96px);
    }

    /* ─── SKIP LINK ─── */
    .skip{
      position:absolute;top:-100%;left:16px;
      padding:8px 16px;border-radius:0 0 8px 8px;
      background:var(--ac);color:#fff;
      font-size:.85rem;font-weight:700;text-decoration:none;
      z-index:9999;transition:top .2s;
    }
    .skip:focus{top:0}

    /* ─── HEADER ─── */
    .hdr{
      display:flex;align-items:center;gap:16px;
      margin-bottom:clamp(20px,4vw,32px);
      animation:up .45s ease both;
    }
    .avatar{
      width:clamp(62px,14vw,76px);height:clamp(62px,14vw,76px);
      border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,var(--ac),var(--ac2));
      display:grid;place-items:center;
      font-size:clamp(22px,6vw,30px);
      outline:2px solid rgba(61,184,245,.35);
      outline-offset:3px;
    }
    .hdr-info h1{
      font-size:clamp(1.1rem,4.5vw,1.45rem);
      font-weight:700;letter-spacing:-.015em;line-height:1.2;
    }
    .name-lnk{
      color:inherit;text-decoration:none;
      border-bottom:2px solid rgba(61,184,245,.3);padding-bottom:1px;
      transition:border-color var(--t);
    }
    .name-lnk:is(:hover,:focus-visible){border-color:var(--ac);outline:none}
    .badge{
      display:inline-flex;align-items:center;gap:5px;
      font-size:.73rem;color:var(--gr);font-weight:500;margin-bottom:3px;
    }
    .dot{
      width:6px;height:6px;border-radius:50%;background:var(--gr);
      animation:pulse 2s infinite;
    }
    .hdr-meta{font-size:.78rem;color:var(--mu);margin-top:3px;line-height:1.6}

    /* ─── DIVIDER ─── */
    hr.div{
      border:none;height:1px;
      background:linear-gradient(90deg,transparent,var(--bd),transparent);
      margin-bottom:18px;
    }

    /* ─── CALL BUTTON ─── */
    .call{
      display:flex;align-items:center;justify-content:center;gap:10px;
      width:100%;padding:clamp(13px,3vw,16px) 20px;
      border-radius:var(--r);
      background:linear-gradient(135deg,var(--ac),var(--ac2));
      color:#fff;font-family:var(--f);
      font-size:clamp(.9rem,3vw,1rem);font-weight:700;letter-spacing:.02em;
      text-decoration:none;border:none;cursor:pointer;
      box-shadow:0 4px 24px var(--glow),inset 0 1px 0 rgba(255,255,255,.12);
      transition:transform var(--t),box-shadow var(--t);
      margin-bottom:10px;
      animation:up .45s .06s ease both;
      position:relative;overflow:hidden;
    }
    .call::after{
      content:'';position:absolute;
      top:0;left:-100%;width:55%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.13),transparent);
      animation:shim 3.5s 1.8s infinite;
    }
    .call:is(:hover,:focus-visible){transform:translateY(-2px);box-shadow:0 10px 36px rgba(61,184,245,.5),inset 0 1px 0 rgba(255,255,255,.12)}
    .call:active{transform:none}
    .call:focus-visible{outline:3px solid var(--ac);outline-offset:3px}
    .call svg{flex-shrink:0;animation:ring 5s 2s infinite}

    /* ─── SECONDARY BUTTONS ─── */
    .sec{
      display:flex;align-items:center;justify-content:center;gap:10px;
      width:100%;padding:clamp(11px,2.5vw,14px) 20px;
      border-radius:var(--r);
      background:var(--sf);border:1px solid var(--bd);
      color:var(--tx);font-family:var(--f);
      font-size:clamp(.85rem,2.5vw,.95rem);font-weight:500;
      text-decoration:none;cursor:pointer;
      transition:transform var(--t),background var(--t),border-color var(--t),box-shadow var(--t);
      margin-bottom:10px;
    }
    .sec:is(:hover,:focus-visible){transform:translateY(-2px);background:var(--sf2);border-color:var(--bdh);box-shadow:0 4px 18px rgba(61,184,245,.1)}
    .sec:focus-visible{outline:3px solid var(--ac);outline-offset:3px}
    .sec svg{color:var(--ac);flex-shrink:0}
    .sec.email{animation:up .45s .12s ease both}
    .sec.pay{animation:up .45s .16s ease both}

    /* ─── NAV GRID ─── */
    .nav{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
      margin-bottom:22px;
      animation:up .45s .2s ease both;
    }
    .card{
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
      padding:clamp(16px,4vw,24px) 12px;
      border-radius:var(--r);
      background:var(--sf);border:1px solid var(--bd);
      text-decoration:none;color:var(--tx);
      font-weight:600;font-size:clamp(.83rem,2.5vw,.92rem);
      transition:transform var(--t),background var(--t),border-color var(--t),box-shadow var(--t);
    }
    .card:is(:hover,:focus-visible){transform:translateY(-3px);background:var(--sf2);border-color:var(--bdh);box-shadow:0 8px 26px rgba(61,184,245,.12)}
    .card:focus-visible{outline:3px solid var(--ac);outline-offset:3px}
    .card .ic{font-size:clamp(1.5rem,5vw,1.9rem);line-height:1}

    /* ─── SOCIAL ─── */
    .social{animation:up .45s .26s ease both}
    .stitle{
      font-size:.66rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
      color:var(--mu);margin-bottom:12px;
      display:flex;align-items:center;gap:8px;
    }
    .stitle::after{content:'';flex:1;height:1px;background:var(--bd)}
    .sgrid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(clamp(42px,12vw,52px),1fr));
      gap:8px;
    }
    .sbtn{
      display:grid;place-items:center;
      aspect-ratio:1;border-radius:var(--rs);
      background:var(--sf);border:1px solid var(--bd);
      text-decoration:none;
      transition:transform .18s,background .18s,border-color .18s,box-shadow .18s;
    }
    .sbtn:is(:hover,:focus-visible){transform:scale(1.1) translateY(-2px);background:var(--sf2);border-color:var(--bdh);box-shadow:0 4px 16px rgba(61,184,245,.16)}
    .sbtn:focus-visible{outline:3px solid var(--ac);outline-offset:3px}
    .sbtn svg{width:22px;height:22px}

    /* ─── FOOTER ─── */
    .ftr{
      text-align:center;margin-top:32px;padding-top:18px;
      border-top:1px solid var(--bd);
      animation:up .45s .32s ease both;
    }
    .ftr p{font-size:.7rem;color:var(--mu);letter-spacing:.03em}
    .ftr span{color:var(--ac);font-weight:500}

    /* ─── KEYFRAMES ─── */
    @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @keyframes pulse{
      0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,209,122,.5)}
      50%{opacity:.8;box-shadow:0 0 0 4px rgba(34,209,122,0)}
    }
    @keyframes ring{
      0%,50%,100%{transform:rotate(0)}
      5%{transform:rotate(-18deg)}10%{transform:rotate(18deg)}
      15%{transform:rotate(-10deg)}20%{transform:rotate(8deg)}25%{transform:rotate(0)}
    }
    @keyframes shim{0%{left:-100%}100%{left:210%}}

    /* ─── PRINT ─── */
    @media print{
      body{background:#fff;color:#000}
      .call{background:#3db8f5!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      .social,.ftr{display:none}
    }
  </style>
</head>
