body::after {
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(26,166,246,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(26,166,246,.04) 1px,transparent 1px);
  background-size:50px 50px;
  z-index:0;
}


.card {
  position:relative;z-index:1;
  width:100%;max-width:480px;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:var(--radius-card);
  padding:clamp(24px,6vw,48px) clamp(20px,5vw,40px) clamp(24px,5vw,40px);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:
    0 0 0 1px rgba(26,166,246,.08),
    0 30px 80px rgba(0,0,0,.5),
    0 0 60px rgba(26,166,246,.06),
    inset 0 1px 0 rgba(255,255,255,.05);
  isolation:isolate;
  will-change:transform;
  animation:cardIn .25s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(24px) scale(.97)}
  to{opacity:1;transform:none}
}

.card::before {
  content:'';position:absolute;top:0;left:50%;
  transform:translateX(-50%);
  width:120px;height:2px;
  background:linear-gradient(90deg,transparent,var(--primary),transparent);
  border-radius:2px;
}

.corner-mark,.corner-mark-bl{position:absolute;width:8px;height:8px;opacity:.5}
.corner-mark{top:16px;right:16px;border-top:1.5px solid var(--primary);border-right:1.5px solid var(--primary)}
.corner-mark-bl{bottom:16px;left:16px;border-bottom:1.5px solid var(--primary);border-left:1.5px solid var(--primary)}


.avatar-wrap{
  display:flex;align-items:center;
  gap:clamp(14px,4vw,24px);
  margin-bottom:clamp(20px,5vw,28px);
}

.avatar-ring{position:relative;flex-shrink:0;aspect-ratio:1}

.avatar-ring::before {
  content:'';position:absolute;inset:-3px;border-radius:50%;
  background:conic-gradient(var(--primary),var(--primary-light),transparent 60%,var(--primary));
  animation:spin 4s linear infinite;z-index:0;
  will-change:transform;
}
@keyframes spin{to{transform:rotate(360deg)}}

.avatar {
  position:relative;z-index:1;
  width:clamp(72px,18vw,90px);height:clamp(72px,18vw,90px);
  border-radius:50%;
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:3px solid var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font);font-weight:800;
  font-size:clamp(20px,5vw,28px);
  color:var(--primary);letter-spacing:-1px;overflow:hidden;aspect-ratio:1;
}

.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}

.status-dot {
  position:absolute;bottom:4px;right:4px;
  width:13px;height:13px;
  background:#22d15b;border-radius:50%;
  border:2px solid var(--bg);z-index:2;
  animation:pulse 2s ease-in-out infinite;
  transform:translateZ(0);
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(34,209,91,.4)}
  50%{box-shadow:0 0 0 5px rgba(34,209,91,0)}
}

.header-text{flex:1;min-width:0}

.badge {
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(26,166,246,.1);border:1px solid rgba(26,166,246,.2);
  color:var(--primary-light);font-size:10px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;margin-bottom:6px;
}
.badge::before{
  content:'';width:5px;height:5px;background:var(--primary);border-radius:50%;
  animation:pulse 2s ease-in-out infinite;
}

/* h1 = tên chính — quan trọng nhất cho SEO */
h1.name {
  font-family:var(--font);font-weight:800;
  text-rendering:optimizeSpeed;
  font-size:clamp(20px,5.5vw,26px);
  color:var(--text);letter-spacing:-.6px;line-height:1.1;
  margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
h1.name span{color:var(--primary)}

.title{
  font-size:clamp(11px,2.8vw,13px);
  color:var(--muted);font-weight:400;
  letter-spacing:.2px;line-height:1.4;
}


.divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,var(--border) 30%,var(--border) 70%,transparent);
  margin:clamp(16px,4vw,24px) 0;
}


.info-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;margin-bottom:clamp(16px,4vw,24px);
}

.info-item{
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);
  border-radius:12px;
  padding:clamp(10px,3vw,14px) clamp(12px,3vw,16px);
  transition:background .2s,border-color .2s;min-width:0;
  contain:layout style;
}
.info-item:hover{background:rgba(26,166,246,.05);border-color:rgba(26,166,246,.15)}

.info-label{
  font-size:10px;letter-spacing:1.2px;text-transform:inherit;
  color:var(--primary-light);font-weight:600;margin-bottom:3px;
}
.info-value{
  font-size:clamp(11px,3vw,15px);color:var(--text);font-weight:400;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}


.social-label{
  font-size:10px;letter-spacing:1.5px;text-transform: inherit;
  color:var(--muted);font-weight:600;margin-bottom:12px;opacity:.55;
}
.social-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:clamp(20px,5vw,28px)}

.social-btn {
  display:flex;align-items:center;gap:7px;
  padding:clamp(8px,2.5vw,10px) clamp(12px,3vw,15px);
  border-radius:50px;
  font-size:clamp(11px,2.8vw,12px);font-weight:500;
  color:var(--text);
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),
             border-color .2s,box-shadow .2s,color .15s;
  position:relative;overflow:hidden;
  min-height:38px;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  contain:layout style;
}
.social-btn::before{
  content:'';position:absolute;inset:0;
  background:var(--btn-color,var(--primary));
  opacity:0;transition:opacity .22s;border-radius:inherit;
}
.social-btn:hover,.social-btn:focus-visible{
  transform:translateY(-2px) scale(1.04);
  border-color:var(--btn-color,var(--primary));
  box-shadow:0 6px 18px rgba(0,0,0,.3),0 0 0 1px var(--btn-color,var(--primary));
  color:#fff;outline:none;
}
.social-btn:hover::before{opacity:.15}
.social-btn svg{width:15px;height:15px;flex-shrink:0;position:relative;z-index:1;transition:transform .22s}
.social-btn:hover svg{transform:scale(1.1)}
.social-btn span{position:relative;z-index:1}

.social-btn.strava  {--btn-color:#fc4c02;border-color:rgba(252,76,2,.2)}
.social-btn.facebook{--btn-color:#1877f2}
.social-btn.telegram{--btn-color:#26a5e4}
.social-btn.whatsapp{--btn-color:#25d366}
.social-btn.zalo    {--btn-color:#0068ff}
.social-btn.tiktok  {--btn-color:#ff0050}
.social-btn.youtube {--btn-color:#ff0000}
.social-btn.wechat     {--btn-color:#07c160;border-color:rgba(7,193,96,.2)}
.social-btn.x-twitter {--btn-color:#ffffff;border-color:rgba(255,255,255,.15)}
.social-btn.instagram  {--btn-color:#e1306c;border-color:rgba(225,48,108,.2)}


.cta-row{display:grid;grid-template-columns:1fr auto;gap:10px}

.btn-contact {
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:clamp(12px,3.5vw,14px) clamp(16px,4vw,24px);
  background:var(--primary);color:#fff;border-radius:14px;
  font-family:var(--font);font-weight:700;
  font-size:clamp(12px,3vw,13.5px);letter-spacing:.2px;
  transition:background .2s,transform .2s,box-shadow .2s;
  box-shadow:0 8px 24px rgba(26,166,246,.35);
  min-height:46px;white-space:nowrap;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.btn-contact:hover{
  background:var(--primary-light);transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(26,166,246,.45);
}

.btn-share {
  display:flex;align-items:center;justify-content:center;
  width:48px;min-height:48px;flex-shrink:0;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:14px;color:var(--muted);
  transition:background .2s,border-color .2s,color .2s,transform .2s;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.btn-share:hover{
  background:rgba(26,166,246,.1);border-color:var(--primary);
  color:var(--primary);transform:translateY(-2px);
}
.btn-share svg{width:18px;height:18px}

.footer-tag{
  text-align:center;margin-top:clamp(16px,4vw,24px);
  font-size:10px;color:rgba(123,168,196,.3);
  letter-spacing:2px;text-transform:inherit;
}


@media(max-width:480px){
  .social-btn span{display:none}
  .social-btn{padding:10px 14px;border-radius:12px;min-height:44px}
  .social-btn svg{width:18px;height:18px}
}
@media(max-width:360px){
  .avatar-wrap{flex-direction:column;align-items:flex-start;gap:14px}
  .info-grid{grid-template-columns:1fr}
  .cta-row{grid-template-columns:1fr}
  .btn-share{width:100%;height:44px}
}
@media(max-height:500px) and (orientation:landscape){
